name: Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager 'platforms;android-35' 'build-tools;35.0.0'

      - name: Build signed release APK
        env:
          VORTEX_SIGNING_STORE_BASE64: ${{ secrets.VORTEX_SIGNING_STORE_BASE64 }}
          VORTEX_SIGNING_STORE_PASSWORD: ${{ secrets.VORTEX_SIGNING_STORE_PASSWORD }}
          VORTEX_SIGNING_KEY_ALIAS: ${{ secrets.VORTEX_SIGNING_KEY_ALIAS }}
          VORTEX_SIGNING_KEY_PASSWORD: ${{ secrets.VORTEX_SIGNING_KEY_PASSWORD }}
        run: ./gradlew --no-daemon assembleRelease

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: vortex-release-apk
          path: app/build/outputs/apk/release/app-release.apk
