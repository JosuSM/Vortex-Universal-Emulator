name: Android Play Release

on:
  workflow_dispatch:
    inputs:
      action:
        description: Release action to run
        required: true
        default: upload
        type: choice
        options:
          - upload
          - promote
      track:
        description: Target Google Play track
        required: true
        default: internal
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      source_track:
        description: Source track when promoting an existing release
        required: false
        default: internal
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      release_status:
        description: Play release status
        required: true
        default: completed
        type: choice
        options:
          - draft
          - inProgress
          - completed
          - halted
      user_fraction:
        description: Staged rollout fraction for inProgress releases, for example 0.1
        required: false
        default: '0.1'
        type: string
      release_notes:
        description: Optional release notes for this upload
        required: false
        default: ''
        type: string

jobs:
  upload-play:
    if: ${{ inputs.action == 'upload' }}
    runs-on: ubuntu-latest
    environment:
      name: play-${{ inputs.track }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager 'platforms;android-35' 'build-tools;35.0.0'

      - name: Prepare release notes
        shell: bash
        run: |
          mkdir -p distribution/whatsnew/en-US
          if [[ -n "${{ inputs.release_notes }}" ]]; then
            printf '%s\n' "${{ inputs.release_notes }}" > distribution/whatsnew/en-US/default.txt
          elif [[ ! -f distribution/whatsnew/en-US/default.txt ]]; then
            printf '%s\n' 'Internal VortexEmulator release.' > distribution/whatsnew/en-US/default.txt
          fi

      - name: Build signed release bundle
        env:
          VORTEX_SIGNING_STORE_BASE64: ${{ secrets.VORTEX_SIGNING_STORE_BASE64 }}
          VORTEX_SIGNING_STORE_PASSWORD: ${{ secrets.VORTEX_SIGNING_STORE_PASSWORD }}
          VORTEX_SIGNING_KEY_ALIAS: ${{ secrets.VORTEX_SIGNING_KEY_ALIAS }}
          VORTEX_SIGNING_KEY_PASSWORD: ${{ secrets.VORTEX_SIGNING_KEY_PASSWORD }}
        run: ./gradlew --no-daemon bundleRelease

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.vortex.emulator
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: ${{ inputs.track }}
          status: ${{ inputs.release_status }}
          userFraction: ${{ inputs.release_status == 'inProgress' && inputs.user_fraction || '' }}
          whatsNewDirectory: distribution/whatsnew

  promote-play:
    if: ${{ inputs.action == 'promote' }}
    runs-on: ubuntu-latest
    environment:
      name: play-${{ inputs.track }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Install Fastlane
        run: gem install fastlane --no-document

      - name: Write Google Play service account
        shell: bash
        run: |
          printf '%s' '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}' > "$RUNNER_TEMP/google-play-service-account.json"

      - name: Promote release between tracks
        env:
          SUPPLY_JSON_KEY: ${{ runner.temp }}/google-play-service-account.json
        run: |
          fastlane supply \
            --package_name com.vortex.emulator \
            --track '${{ inputs.source_track }}' \
            --track_promote_to '${{ inputs.track }}' \
            --release_status '${{ inputs.release_status }}' \
            --skip_upload_apk true \
            --skip_upload_aab true \
            --skip_upload_metadata true \
            --skip_upload_images true \
            --skip_upload_screenshots true
